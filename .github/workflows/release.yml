name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          cd custom_components
          zip -r ../vtherm_hysteresis.zip vtherm_hysteresis/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: vtherm_hysteresis.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
